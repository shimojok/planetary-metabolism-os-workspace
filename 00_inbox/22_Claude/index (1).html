<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MBT Probiotics Screening Game v2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-50 to-green-50">
    <div id="app"></div>

    <script>
        const API_URL = 'http://localhost:8000';
        
        let state = {
            step: 'intro',
            questionnaire: {},
            answers: {},
            predictions: [],
            selectedDisease: null
        };

        function setState(newState) {
            state = { ...state, ...newState };
            render();
        }

        async function loadQuestionnaire() {
            const res = await fetch(`${API_URL}/api/questionnaire`);
            const data = await res.json();
            setState({ questionnaire: data.questionnaire });
        }

        async function submitAnswers() {
            const res = await fetch(`${API_URL}/api/predict_risk`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ answers: state.answers })
            });
            const data = await res.json();
            setState({ predictions: data.predictions, step: 'risk' });
        }

        function IntroScreen() {
            return `
                <div class="min-h-screen p-8 flex items-center justify-center">
                    <div class="max-w-5xl w-full bg-white rounded-3xl shadow-2xl p-12">
                        <div class="text-center mb-8">
                            <h1 class="text-5xl font-bold bg-gradient-to-r from-blue-600 to-green-600 bg-clip-text text-transparent mb-4">
                                MBT Probiotics Development Game
                            </h1>
                            <p class="text-2xl text-gray-600">v2.0 Enhanced Edition</p>
                        </div>

                        <div class="bg-gradient-to-r from-blue-100 to-green-100 border-l-4 border-blue-600 p-8 mb-8 rounded-lg">
                            <h2 class="text-2xl font-semibold text-blue-900 mb-4">🚀 特徴</h2>
                            <div class="grid md:grid-cols-2 gap-4 text-blue-800">
                                <div>
                                    <h3 class="font-semibold mb-2">✨ 問診システム</h3>
                                    <ul class="space-y-1 text-sm">
                                        <li>• 10項目（30秒）</li>
                                        <li>• 30万人実証データ</li>
                                    </ul>
                                </div>
                                <div>
                                    <h3 class="font-semibold mb-2">🧬 ファイトケミカル</h3>
                                    <ul class="space-y-1 text-sm">
                                        <li>• 詳細データベース</li>
                                        <li>• 実践的な摂取ガイド</li>
                                    </ul>
                                </div>
                            </div>
                        </div>

                        <div class="grid grid-cols-4 gap-4 mb-10">
                            <div class="bg-gradient-to-br from-blue-50 to-blue-100 p-6 rounded-xl text-center">
                                <div class="text-4xl font-bold text-blue-600">10</div>
                                <div class="text-sm text-gray-600 mt-2">問診項目</div>
                            </div>
                            <div class="bg-gradient-to-br from-green-50 to-green-100 p-6 rounded-xl text-center">
                                <div class="text-4xl font-bold text-green-600">12</div>
                                <div class="text-sm text-gray-600 mt-2">ファイトケミカル</div>
                            </div>
                            <div class="bg-gradient-to-br from-purple-50 to-purple-100 p-6 rounded-xl text-center">
                                <div class="text-4xl font-bold text-purple-600">93</div>
                                <div class="text-sm text-gray-600 mt-2">疾病分析</div>
                            </div>
                            <div class="bg-gradient-to-br from-orange-50 to-orange-100 p-6 rounded-xl text-center">
                                <div class="text-4xl font-bold text-orange-600">30万</div>
                                <div class="text-sm text-gray-600 mt-2">実証データ</div>
                            </div>
                        </div>

                        <button 
                            onclick="setState({ step: 'questionnaire' }); loadQuestionnaire();"
                            class="w-full bg-gradient-to-r from-blue-600 via-green-600 to-purple-600 text-white text-xl font-bold py-5 px-8 rounded-2xl hover:shadow-2xl transition transform hover:scale-105"
                        >
                            🚀 開始する
                        </button>
                    </div>
                </div>
            `;
        }

        function QuestionnaireScreen() {
            const questions = Object.entries(state.questionnaire);
            const allAnswered = questions.length > 0 && questions.every(([id]) => state.answers[id] !== undefined);

            return `
                <div class="min-h-screen p-8">
                    <div class="max-w-3xl mx-auto bg-white rounded-2xl shadow-xl p-8">
                        <h2 class="text-3xl font-bold text-gray-900 mb-6">ミニ問診（10項目）</h2>
                        
                        <div class="space-y-4 mb-8">
                            ${questions.map(([id, q]) => `
                                <div class="bg-gray-50 p-5 rounded-lg">
                                    <p class="text-lg text-gray-800 mb-3">${q.question}</p>
                                    <div class="flex gap-4">
                                        <button 
                                            onclick="state.answers[${id}] = true; render();"
                                            class="flex-1 py-2 px-4 rounded-lg font-medium transition ${
                                                state.answers[id] === true 
                                                    ? 'bg-blue-600 text-white' 
                                                    : 'bg-white text-gray-700 border border-gray-300'
                                            }"
                                        >
                                            はい
                                        </button>
                                        <button 
                                            onclick="state.answers[${id}] = false; render();"
                                            class="flex-1 py-2 px-4 rounded-lg font-medium transition ${
                                                state.answers[id] === false 
                                                    ? 'bg-gray-600 text-white' 
                                                    : 'bg-white text-gray-700 border border-gray-300'
                                            }"
                                        >
                                            いいえ
                                        </button>
                                    </div>
                                </div>
                            `).join('')}
                        </div>

                        <button 
                            onclick="submitAnswers();"
                            ${!allAnswered ? 'disabled' : ''}
                            class="w-full bg-gradient-to-r from-blue-600 to-green-600 text-white text-lg font-semibold py-4 rounded-lg disabled:opacity-50"
                        >
                            疾病リスクを予測
                        </button>
                    </div>
                </div>
            `;
        }

        function RiskResultsScreen() {
            return `
                <div class="min-h-screen p-8">
                    <div class="max-w-7xl mx-auto bg-white rounded-2xl shadow-xl p-8">
                        <h2 class="text-3xl font-bold text-gray-900 mb-8">疾病リスク予測結果</h2>
                        
                        <div class="space-y-6">
                            ${state.predictions.map((pred, idx) => `
                                <div 
                                    onclick="setState({ selectedDisease: ${JSON.stringify(pred).replace(/"/g, '&quot;')}, step: 'detail' });"
                                    class="border-2 border-gray-200 rounded-xl p-6 hover:shadow-2xl transition cursor-pointer"
                                >
                                    <div class="flex items-start justify-between mb-4">
                                        <div>
                                            <h3 class="text-2xl font-bold text-gray-900">${idx + 1}. ${pred.disease}</h3>
                                            <div class="flex items-center gap-4 mt-2">
                                                <span class="px-4 py-1 rounded-full font-medium ${
                                                    pred.risk_level === 'HIGH' ? 'bg-red-100 text-red-800' :
                                                    pred.risk_level === 'MEDIUM' ? 'bg-yellow-100 text-yellow-800' :
                                                    'bg-green-100 text-green-800'
                                                }">
                                                    ${pred.risk_level}
                                                </span>
                                                <span class="text-gray-600">
                                                    スコア: <span class="font-bold">${pred.risk_score}/100</span>
                                                </span>
                                            </div>
                                        </div>
                                    </div>

                                    ${pred.recommended_phytochemicals.length > 0 ? `
                                        <div class="mt-4 bg-blue-50 rounded-lg p-4">
                                            <div class="text-sm font-semibold text-blue-900 mb-2">
                                                💊 推奨ファイトケミカル（${pred.recommended_phytochemicals.length}種類）
                                            </div>
                                            <div class="flex flex-wrap gap-2">
                                                ${pred.recommended_phytochemicals.map(rec => `
                                                    <span class="px-3 py-1 bg-white rounded-full text-xs font-medium text-blue-700">
                                                        ${rec.phytochemical.japanese_name}
                                                    </span>
                                                `).join('')}
                                            </div>
                                        </div>
                                    ` : ''}

                                    <div class="mt-4 text-sm text-gray-600">
                                        👉 クリックして詳細を見る
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
        }

        function DiseaseDetailScreen() {
            const disease = state.selectedDisease;
            if (!disease) return '';

            return `
                <div class="min-h-screen p-8">
                    <div class="max-w-6xl mx-auto bg-white rounded-2xl shadow-xl p-8">
                        <button 
                            onclick="setState({ step: 'risk' });"
                            class="text-blue-600 hover:text-blue-800 mb-4"
                        >
                            ← 戻る
                        </button>

                        <h2 class="text-4xl font-bold text-gray-900 mb-6">${disease.disease}</h2>
                        
                        <div class="flex items-center gap-4 mb-8">
                            <span class="px-4 py-2 rounded-full font-medium text-lg ${
                                disease.risk_level === 'HIGH' ? 'bg-red-100 text-red-800' :
                                disease.risk_level === 'MEDIUM' ? 'bg-yellow-100 text-yellow-800' :
                                'bg-green-100 text-green-800'
                            }">
                                ${disease.risk_level} リスク
                            </span>
                            <span class="text-2xl font-bold text-gray-700">${disease.risk_score}/100</span>
                        </div>

                        <div class="mb-8">
                            <h3 class="text-2xl font-bold text-gray-900 mb-6">💊 推奨ファイトケミカル</h3>
                            
                            ${disease.recommended_phytochemicals.map((rec, idx) => `
                                <div class="border-2 border-blue-200 rounded-xl p-6 bg-gradient-to-r from-blue-50 to-purple-50 mb-6">
                                    <div class="flex items-start justify-between mb-4">
                                        <div>
                                            <h4 class="text-2xl font-bold text-blue-900 mb-1">
                                                ${rec.phytochemical.japanese_name}
                                            </h4>
                                            <p class="text-sm text-gray-600">
                                                ${rec.phytochemical.classification} / ${rec.phytochemical.subcategory}
                                            </p>
                                        </div>
                                        <div class="text-right">
                                            <div class="text-3xl font-bold text-blue-600">
                                                ${Math.round(rec.relevance_score)}
                                            </div>
                                            <div class="text-xs text-gray-500">関連性</div>
                                        </div>
                                    </div>

                                    <div class="mb-4">
                                        <div class="text-sm font-semibold text-gray-700 mb-2">📦 含有食品:</div>
                                        <div class="flex flex-wrap gap-2">
                                            ${rec.phytochemical.source_foods.map(food => `
                                                <span class="px-3 py-1 bg-white rounded-lg text-sm border border-gray-200">
                                                    ${food}
                                                </span>
                                            `).join('')}
                                        </div>
                                    </div>

                                    <div class="mb-4">
                                        <div class="text-sm font-semibold text-gray-700 mb-2">✨ 臨床効果:</div>
                                        <div class="grid grid-cols-2 gap-2">
                                            ${rec.phytochemical.clinical_benefits.map(benefit => `
                                                <div class="flex items-center gap-2 text-sm text-gray-700">
                                                    <span class="text-green-500">✓</span>
                                                    ${benefit}
                                                </div>
                                            `).join('')}
                                        </div>
                                    </div>

                                    <div class="bg-white rounded-lg p-4 mb-4">
                                        <div class="text-sm font-semibold text-gray-700 mb-2">🔬 吸収メカニズム:</div>
                                        <p class="text-sm text-gray-600">${rec.phytochemical.absorption_mechanism}</p>
                                    </div>

                                    <div class="grid grid-cols-3 gap-4 text-center mb-4">
                                        <div class="bg-white rounded-lg p-3">
                                            <div class="text-xs text-gray-500 mb-1">推奨摂取量</div>
                                            <div class="text-lg font-bold text-blue-600">
                                                ${rec.phytochemical.daily_intake_mg} mg/日
                                            </div>
                                        </div>
                                        <div class="bg-white rounded-lg p-3">
                                            <div class="text-xs text-gray-500 mb-1">生物学的利用能</div>
                                            <div class="text-lg font-bold text-green-600">
                                                ${rec.phytochemical.bioavailability}
                                            </div>
                                        </div>
                                        <div class="bg-white rounded-lg p-3">
                                            <div class="text-xs text-gray-500 mb-1">MBT55経路</div>
                                            <div class="text-sm font-bold text-purple-600">
                                                ${rec.phytochemical.mbt_pathway}
                                            </div>
                                        </div>
                                    </div>

                                    <div class="bg-yellow-50 border-l-4 border-yellow-400 p-4">
                                        <div class="text-sm font-semibold text-yellow-900 mb-1">💡 実践例</div>
                                        <p class="text-sm text-yellow-800">${rec.practical_example}</p>
                                    </div>
                                </div>
                            `).join('')}
                        </div>

                        <button 
                            onclick="alert('処方選択機能は開発中です');"
                            class="w-full bg-gradient-to-r from-purple-600 to-pink-600 text-white text-lg font-bold py-4 rounded-xl hover:shadow-xl transition"
                        >
                            漢方処方を選択 →
                        </button>
                    </div>
                </div>
            `;
        }

        function render() {
            const app = document.getElementById('app');
            
            let content = '';
            switch (state.step) {
                case 'intro':
                    content = IntroScreen();
                    break;
                case 'questionnaire':
                    content = QuestionnaireScreen();
                    break;
                case 'risk':
                    content = RiskResultsScreen();
                    break;
                case 'detail':
                    content = DiseaseDetailScreen();
                    break;
            }
            
            app.innerHTML = content;
        }

        // 初期レンダリング
        render();
    </script>
</body>
</html>
