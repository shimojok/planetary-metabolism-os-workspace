<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PMOS - Planetary Metabolism OS v1.0</title>
    <style>
        :root { --neon-green: #00ffcc; --dark-bg: #0a0f1e; }
        body { background: var(--dark-bg); color: var(--neon-green); font-family: 'Courier New', Courier, monospace; padding: 40px; }
        .dashboard { border: 2px solid var(--neon-green); padding: 30px; border-radius: 15px; box-shadow: 0 0 20px rgba(0,255,204,0.2); }
        h1 { text-transform: uppercase; letter-spacing: 5px; border-bottom: 1px solid var(--neon-green); padding-bottom: 10px; }
        .status-bar { display: flex; justify-content: space-between; font-size: 0.8em; margin-bottom: 30px; color: #888; }
        .quest-box { background: rgba(0,255,204,0.05); padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        button { background: transparent; border: 1px solid var(--neon-green); color: var(--neon-green); padding: 10px 20px; cursor: pointer; transition: 0.3s; }
        button:hover { background: var(--neon-green); color: var(--dark-bg); }
        #results { margin-top: 30px; padding: 20px; border-left: 4px solid #ff0055; display: none; }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="status-bar">
            <span>SYSTEM: ONLINE</span>
            <span>DATA NODES: 4,304</span>
            <span>CLINICAL SAMPLES: 300,000+</span>
        </div>
        <h1>Planetary Metabolism OS</h1>
        <p>下條様、BioNexus知能ネットワークへようこそ。解析を開始しますか？</p>

        <div class="quest-box">
            <h3>[ 簡易代謝アセスメント ]</h3>
            <p>1. 睡眠の質（1-10）: <input type="number" id="q1" value="5"></p>
            <p>2. ストレスレベル（1-10）: <input type="number" id="q2" value="5"></p>
            <button onclick="runInference()">解析実行 (Run PMOS Inference)</button>
        </div>

        <div id="results">
            <h3>■ 推論結果レポート</h3>
            <p id="output-text">4,304のノードから最適なファイトケミカル処方を特定中...</p>
        </div>
    </div>

    <script>
        function runInference() {
            const results = document.getElementById('results');
            const output = document.getElementById('output-text');
            results.style.display = 'block';
            output.innerHTML = "解析中...<br>MBT Probiotics: Formula-X21 を推奨。<br>関連ノート: 30万人実証データセクション4.2を参照。";
        }
    </script>
</body>
</html>
